<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fallen Throne - Mercado Medieval</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>
    <div id="confirm-overlay" style="display: none;"></div>

    <!-- Ícone fixo de conta: permite trocar/sair da conta logada -->
    <div id="conta-flutuante" style="display: none;">
        <button id="botao-conta" onclick="alternarMenuConta()" title="Conta">
            <img id="avatar-flutuante" src="" alt="Conta">
        </button>
        <div id="menu-conta" style="display: none;">
            <span id="menu-conta-nome">Carregando...</span>
            <button onclick="trocarDeConta()" class="btn-vender">Sair / Trocar de conta</button>
        </div>
    </div>

    <div id="auth-overlay">
        <div id="auth-container" class="auth-box">
            <h2>Entrar no Reino</h2>
            <input type="text" id="login-nome" placeholder="Nome do Personagem (ex: Ned Stark)">
            <input type="email" id="login-email" placeholder="Seu e-mail">
            <input type="password" id="login-senha" placeholder="Sua senha">
            <div class="auth-buttons">
                <button onclick="fazerLogin()">Entrar</button>
                <button onclick="fazerCadastro()">Cadastrar</button>
            </div>
        </div>
    </div>

    <div class="container">

        <div id="banner-global" class="banner-aviso" style="display: none;">
         <span id="texto-aviso"></span>
        </div>

        <div id="painel-mestre" class="admin-only" style="display: none;">
          <h3>Comando do Mestre</h3>
         <input type="text" id="input-aviso" placeholder="Escreva um aviso para o reino...">
           <button onclick="enviarAviso()">Enviar Mensagem</button>
           <button onclick="limparAviso()" class="btn-vender">Remover Aviso</button>
        </div>

        <header>
            <svg class="brasao" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brasão do reino">
                <defs>
                    <linearGradient id="ouroGradBrasao" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#e8d5a0"/>
                        <stop offset="100%" stop-color="#996515"/>
                    </linearGradient>
                </defs>
                <path d="M50 4 L92 16 L92 56 C92 86 74 104 50 112 C26 104 8 86 8 56 L8 16 Z"
                      fill="#16130f" stroke="url(#ouroGradBrasao)" stroke-width="2.5"/>
                <path d="M50 12 L84 22 L84 56 C84 80 70 95 50 102 C30 95 16 80 16 56 L16 22 Z"
                      fill="none" stroke="#6b5320" stroke-width="1"/>
                <path d="M50 28 C40 28 33 35 33 44 C33 51 38 55 38 60 L33 68 L40 68 L40 72 L60 72 L60 68 L67 68 L62 60 C62 55 67 51 67 44 C67 35 60 28 50 28 Z"
                      fill="url(#ouroGradBrasao)"/>
                <circle cx="43" cy="42" r="2.5" fill="#16130f"/>
                <circle cx="57" cy="42" r="2.5" fill="#16130f"/>
                <path d="M30 80 L70 80 L65 92 L50 98 L35 92 Z" fill="none" stroke="#6b5320" stroke-width="1"/>
            </svg>
            <p class="eyebrow">The Fallen Throne · RPG System</p>
            <h1>Mercado de Westeros</h1>
            <p class="subtitulo">Bens, Lâminas &amp; Relíquias do Reino</p>
            <div class="ornamento-linha">
                <span class="linha"></span>
                <span class="losango"></span>
                <span class="linha direita"></span>
            </div>

            <div id="perfil-jogador" class="perfil-box">
              <img id="avatar-perfil" class="avatar" src="" alt="Avatar do personagem">
              <div class="perfil-textos">
                  <span id="nome-perfil">Carregando personagem...</span>
                  <div class="perfil-acoes">
                      <button onclick="mostrarTrocaNome()" class="btn-pequeno">Trocar Nome</button>
                      <button onclick="mostrarTrocaFoto()" class="btn-pequeno">Trocar Foto</button>
                  </div>

                  <div id="input-troca-nome" style="display: none; margin-top: 10px;">
                      <input type="text" id="novo-nome-input" placeholder="Novo nome do herói">
                      <button onclick="salvarNovoNome()">Confirmar</button>
                  </div>

                  <div id="input-troca-foto" style="display: none; margin-top: 10px;">
                      <input type="text" id="nova-foto-input" placeholder="Cole o link (URL) de uma imagem">
                      <button onclick="salvarNovaFoto()">Confirmar</button>
                  </div>
              </div>
            </div>

            <div id="saldo-jogador">
                Moedas: <span id="coins">1500</span> ic's
            </div>
        </header>

        <nav class="filtros">
            <button class="ativo" onclick="filtrarItens('todos')">Todos</button>
            <button onclick="filtrarItens('Arma')">Armas</button>
            <button onclick="filtrarItens('Armadura')">Defesa</button>
            <button onclick="filtrarItens('Consumível')">Consumíveis</button>
        </nav>

        <main class="grid-mercado" id="vitrine">
            </main>
        <!-- Procure a tag </main> e adicione isso logo abaixo dela -->
        <hr style="border: 1px solid #333; margin: 40px 0;">

        <section class="inventario-container">
       <h2>Minha Mochila</h2>
         <div id="lista-inventario" class="grid-mercado">
        <!-- Itens comprados aparecerão aqui -->
         </div>
        </section>
    </div>

    <hr style="border: 1px solid #333; margin: 40px 0;">

        <section class="comunidade-container">
         <h2>Exploradores de Westeros</h2>
         <div id="lista-comunidade" class="grid-comunidade">
        <!-- Dados de outros jogadores aparecerão aqui -->
         </div>
        </section>

<!-- Importando Firebase como Módulos -->
<script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
</script>
<script type="module" src="script.js"></script>
</body>
</html>
