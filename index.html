<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fallen Throne - Mercado Medieval</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>
    <div id="confirm-overlay" style="display: none;"></div>

    <!-- Ícone fixo de mochila: acesso rápido à página da mochila -->
    <button id="botao-mochila-flutuante" style="display: none;" onclick="mostrarPagina('mochila')" title="Minha Mochila">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 7V5.5A2.5 2.5 0 0110.5 3h3A2.5 2.5 0 0116 5.5V7m-9 0h10a2 2 0 012 2v9a2 2 0 01-2 2H7a2 2 0 01-2-2V9a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span id="badge-mochila" class="badge-contador" style="display: none;">0</span>
    </button>

    <!-- Ícone fixo de conta: permite trocar/sair da conta logada -->
    <div id="conta-flutuante" style="display: none;">
        <button id="botao-conta" onclick="alternarMenuConta()" title="Conta">
            <img id="avatar-flutuante" src="" alt="Conta">
        </button>
        <div id="menu-conta" style="display: none;">
            <span id="menu-conta-nome">Carregando...</span>
            <button onclick="trocarDeConta()" class="btn-vender">Sair / Trocar de conta</button>
        </div>
    </div>

    <div id="auth-overlay">
        <div id="auth-container" class="auth-box">
            <h2>Entrar no Reino</h2>
            <input type="text" id="login-nome" placeholder="Nome do Personagem (ex: Ned Stark)">
            <input type="email" id="login-email" placeholder="Seu e-mail">
            <input type="password" id="login-senha" placeholder="Sua senha">
            <div class="auth-buttons">
                <button onclick="fazerLogin()">Entrar</button>
                <button onclick="fazerCadastro()">Cadastrar</button>
            </div>
        </div>
    </div>

    <div class="container">

        <div id="banner-global" class="banner-aviso" style="display: none;">
         <span id="texto-aviso"></span>
        </div>

        <div id="painel-mestre" class="admin-only" style="display: none;">
          <h3>Comando do Mestre</h3>
         <input type="text" id="input-aviso" placeholder="Escreva um aviso para o reino...">
           <button onclick="enviarAviso()">Enviar Mensagem</button>
           <button onclick="limparAviso()" class="btn-vender">Remover Aviso</button>
        </div>

        <header>
            <svg class="brasao" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brasão do reino">
                <defs>
                    <linearGradient id="ouroGradBrasao" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#e8d5a0"/>
                        <stop offset="100%" stop-color="#996515"/>
                    </linearGradient>
                </defs>
                <path d="M50 4 L92 16 L92 56 C92 86 74 104 50 112 C26 104 8 86 8 56 L8 16 Z"
                      fill="#16130f" stroke="url(#ouroGradBrasao)" stroke-width="2.5"/>
                <path d="M50 12 L84 22 L84 56 C84 80 70 95 50 102 C30 95 16 80 16 56 L16 22 Z"
                      fill="none" stroke="#6b5320" stroke-width="1"/>
                <path d="M50 28 C40 28 33 35 33 44 C33 51 38 55 38 60 L33 68 L40 68 L40 72 L60 72 L60 68 L67 68 L62 60 C62 55 67 51 67 44 C67 35 60 28 50 28 Z"
                      fill="url(#ouroGradBrasao)"/>
                <circle cx="43" cy="42" r="2.5" fill="#16130f"/>
                <circle cx="57" cy="42" r="2.5" fill="#16130f"/>
                <path d="M30 80 L70 80 L65 92 L50 98 L35 92 Z" fill="none" stroke="#6b5320" stroke-width="1"/>
            </svg>
            <p class="eyebrow">The Fallen Throne · RPG System</p>
            <h1>Mercado de Westeros</h1>
            <p class="subtitulo">Bens, Lâminas &amp; Relíquias do Reino</p>
            <div class="ornamento-linha">
                <span class="linha"></span>
                <span class="losango"></span>
                <span class="linha direita"></span>
            </div>

            <div id="perfil-jogador" class="perfil-box">
              <img id="avatar-perfil" class="avatar" src="" alt="Avatar do personagem">
              <div class="perfil-textos">
                  <span id="nome-perfil">Carregando personagem...</span>
                  <div class="perfil-acoes">
                      <button onclick="mostrarTrocaNome()" class="btn-pequeno">Trocar Nome</button>
                      <button onclick="mostrarTrocaFoto()" class="btn-pequeno">Trocar Foto</button>
                  </div>

                  <div id="input-troca-nome" style="display: none; margin-top: 10px;">
                      <input type="text" id="novo-nome-input" placeholder="Novo nome do herói">
                      <button onclick="salvarNovoNome()">Confirmar</button>
                  </div>

                  <div id="input-troca-foto" style="display: none; margin-top: 10px;">
                      <input type="text" id="nova-foto-input" placeholder="Cole o link (URL) de uma imagem">
                      <button onclick="salvarNovaFoto()">Confirmar</button>
                  </div>
              </div>
            </div>

            <div id="saldo-jogador">
                Moedas: <span id="coins">1500</span> ic's
            </div>
        </header>

        <!-- Navegação entre as páginas do reino -->
        <nav class="paginas-nav">
            <button class="pagina-tab ativa" onclick="mostrarPagina('vitrine')">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 9L4.5 4h15L21 9M3 9v10a1 1 0 001 1h16a1 1 0 001-1V9M3 9h18M9 21v-6h6v6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                Mercado
            </button>
            <button class="pagina-tab" onclick="mostrarPagina('fichas')">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 3h10a1 1 0 011 1v16a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 7h6M9 11h6M9 15h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Minhas Fichas
            </button>
            <button class="pagina-tab" onclick="mostrarPagina('mochila')">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 7V5.5A2.5 2.5 0 0110.5 3h3A2.5 2.5 0 0116 5.5V7m-9 0h10a2 2 0 012 2v9a2 2 0 01-2 2H7a2 2 0 01-2-2V9a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                Mochila
            </button>
            <button class="pagina-tab" onclick="mostrarPagina('mural')">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/><circle cx="17" cy="9" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M4 19c0-2.8 2.2-5 5-5s5 2.2 5 5M14 19c0-1.8.6-3.4 1.6-4.6.5-.2 1-.4 1.4-.4 2 0 3.5 1.6 3.5 3.5v1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                Exploradores
            </button>
        </nav>

        <!-- PÁGINA: VITRINE / MERCADO -->
        <section id="pagina-vitrine" class="pagina-conteudo">
            <nav class="filtros">
                <button class="ativo" onclick="filtrarItens('todos')">Todos</button>
                <button onclick="filtrarItens('Arma')">Armas</button>
                <button onclick="filtrarItens('Armadura')">Defesa</button>
                <button onclick="filtrarItens('Consumível')">Consumíveis</button>
            </nav>

            <main class="grid-mercado" id="vitrine">
                </main>
        </section>

        <!-- PÁGINA: MINHAS FICHAS -->
        <section id="pagina-fichas" class="pagina-conteudo" style="display: none;">
            <section class="fichas-container">
                <div class="fichas-cabecalho">
                    <h2>Minhas Fichas</h2>
                    <button class="btn-criar-ficha" onclick="abrirFormularioFicha()">+ Criar Nova Ficha</button>
                </div>

                <div id="lista-fichas" class="grid-fichas">
                    <!-- Cards de fichas da conta aparecerão aqui -->
                </div>
            </section>

            <!-- Formulário de criação/edição de ficha (modal) -->
            <div id="formulario-ficha-overlay" style="display: none;">
                <div class="formulario-ficha-box">
                    <h3 id="formulario-ficha-titulo">Criar Novo Personagem</h3>

                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="ficha-nome" placeholder="Ex: Jon Snow">
                    </div>

                    <div class="ficha-row">
                        <div class="input-group">
                            <label>Casa</label>
                            <select id="ficha-casa">
                                <option value="Sem Casa">Nenhuma / Bastardo</option>
                                <option value="Stark">Casa Stark</option>
                                <option value="Lannister">Casa Lannister</option>
                                <option value="Targaryen">Casa Targaryen</option>
                                <option value="Baratheon">Casa Baratheon</option>
                                <option value="Tyrell">Casa Tyrell</option>
                                <option value="Arryn">Casa Arryn</option>
                                <option value="Casa Menor">Casa Menor</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Origem Social</label>
                            <select id="ficha-origem" onchange="atualizarClassesDisponiveis()">
                                <option value="Plebeu">Plebeu (Povo Comum)</option>
                                <option value="Nobre">Nobreza (Lorde / Lady)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Classe / Ofício</label>
                            <select id="ficha-classe"></select>
                        </div>
                    </div>

                    <div class="ficha-row tripartite">
                        <div class="input-group">
                            <label>Idade</label>
                            <input type="number" id="ficha-idade" placeholder="25">
                        </div>
                        <div class="input-group">
                            <label>Gênero</label>
                            <input type="text" id="ficha-genero" placeholder="Masculino">
                        </div>
                        <div class="input-group">
                            <label>Altura</label>
                            <input type="text" id="ficha-altura" placeholder="1.80m">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Retrato (link de imagem)</label>
                        <input type="text" id="ficha-foto" placeholder="Cole o link (URL) de uma imagem">
                    </div>

                    <div class="input-group">
                        <label>Tema da Ficha</label>
                        <select id="ficha-tema">
                            <option value="theme-classic">📜 Pergaminho Clássico</option>
                            <option value="theme-dark">🌑 Noite Estelar (Modo Escuro)</option>
                            <option value="theme-snow">❄️ Inverno (Neve/Stark)</option>
                            <option value="theme-fire">🔥 Fogo Dragão (Targaryen)</option>
                            <option value="theme-iron">⚓ Homens de Ferro (Rústico/Metal)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>História &amp; Biografia</label>
                        <textarea id="ficha-sobre" placeholder="Conte a jornada do seu personagem..."></textarea>
                    </div>

                    <div class="formulario-ficha-botoes">
                        <button class="btn-secondary" onclick="fecharFormularioFicha()">Cancelar</button>
                        <button class="btn-main" onclick="salvarFicha()">⚔️ Salvar Ficha</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PÁGINA: MOCHILA -->
        <section id="pagina-mochila" class="pagina-conteudo" style="display: none;">
            <section class="inventario-container">
                <h2>Minha Mochila</h2>
                <div id="lista-inventario" class="grid-mercado">
                    <!-- Itens comprados aparecerão aqui -->
                </div>
            </section>
        </section>

        <!-- PÁGINA: MURAL DA COMUNIDADE -->
        <section id="pagina-mural" class="pagina-conteudo" style="display: none;">
            <section class="comunidade-container">
                <h2>Exploradores de Westeros</h2>
                <div id="lista-comunidade" class="grid-comunidade">
                    <!-- Dados de outros jogadores aparecerão aqui -->
                </div>
            </section>
        </section>
    </div>

<!-- Importando Firebase como Módulos -->
<script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
</script>
<script type="module" src="script.js"></script>
</body>
</html>
